name: hyperpersona

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: hyperpersona-server-1
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - ./server/src:/app/src
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - traces:/app/traces
    environment:
      REDIS_URL: redis://redis:6379
      # `-` (not `:-`) so an empty value in .env means "use real AWS DynamoDB"
      # rather than falling back to the local container.
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT-http://dynamodb-local:8000}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-${AWS_REGION:-us-east-1}}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-local}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-local}
      # Required for Workshop Studio temp (ASIA) creds; empty for permanent IAM.
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      TRACE_SYNC_MODE: ${TRACE_SYNC_MODE:-local}
      S3_TRACES_BUCKET: ${S3_TRACES_BUCKET:-}
      QUEUE_MODE: ${QUEUE_MODE:-redis}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-}
      API_KEY: ${API_KEY:-test-key}
      TRACES_DB_DIR: /app/traces
      MAX_QUEUE_DEPTH: ${MAX_QUEUE_DEPTH:-10000}
      MAX_EVENTS_PER_CUSTOMER_PER_MIN: ${MAX_EVENTS_PER_CUSTOMER_PER_MIN:-100}
      MAX_REQUESTS_PER_KEY_PER_MIN: ${MAX_REQUESTS_PER_KEY_PER_MIN:-1000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      BEDROCK_MODE: ${BEDROCK_MODE:-mock}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}
      BEDROCK_TEXT_MODEL: ${BEDROCK_TEXT_MODEL:-anthropic.claude-sonnet-4-5-20250929-v1:0}
      BEDROCK_EMBED_MODEL: ${BEDROCK_EMBED_MODEL:-amazon.titan-embed-text-v2:0}
      # Per-task overrides; empty falls back to BEDROCK_TEXT_MODEL in code.
      BEDROCK_ANALYZER_MODEL: ${BEDROCK_ANALYZER_MODEL:-}
      BEDROCK_ORCHESTRATOR_MODEL: ${BEDROCK_ORCHESTRATOR_MODEL:-}
      BEDROCK_RECOMMENDER_MODEL: ${BEDROCK_RECOMMENDER_MODEL:-}
      BEDROCK_VERIFIER_MODEL: ${BEDROCK_VERIFIER_MODEL:-}
      VECTOR_MODE: ${VECTOR_MODE:-opensearch}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-opensearch}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT:-9200}
      AOSS_ENDPOINT: ${AOSS_ENDPOINT:-}
    depends_on:
      - redis
      - dynamodb-local
      - opensearch
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    # No container_name — worker is the one service we scale horizontally
    # (`docker compose up --scale worker=N`). Compose auto-names replicas as
    # hyperpersona-worker-1, hyperpersona-worker-2, ... when no container_name
    # is set. Each replica gets its own SQLite trace file via TraceLogger.
    volumes:
      - ./worker/src:/app/src
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - traces:/app/traces
    environment:
      REDIS_URL: redis://redis:6379
      DYNAMODB_ENDPOINT: ${DYNAMODB_ENDPOINT-http://dynamodb-local:8000}
      TRACES_DB_DIR: /app/traces
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-${AWS_REGION:-us-east-1}}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-local}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-local}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      BEDROCK_MODE: ${BEDROCK_MODE:-mock}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}
      BEDROCK_TEXT_MODEL: ${BEDROCK_TEXT_MODEL:-anthropic.claude-sonnet-4-5-20250929-v1:0}
      BEDROCK_EMBED_MODEL: ${BEDROCK_EMBED_MODEL:-amazon.titan-embed-text-v2:0}
      BEDROCK_ANALYZER_MODEL: ${BEDROCK_ANALYZER_MODEL:-}
      BEDROCK_ORCHESTRATOR_MODEL: ${BEDROCK_ORCHESTRATOR_MODEL:-}
      BEDROCK_RECOMMENDER_MODEL: ${BEDROCK_RECOMMENDER_MODEL:-}
      BEDROCK_VERIFIER_MODEL: ${BEDROCK_VERIFIER_MODEL:-}
      VECTOR_MODE: ${VECTOR_MODE:-opensearch}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-opensearch}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT:-9200}
      AOSS_ENDPOINT: ${AOSS_ENDPOINT:-}
      EVENT_PROCESSING_MODE: ${EVENT_PROCESSING_MODE:-full}
      SESSION_FLUSH_THRESHOLD: ${SESSION_FLUSH_THRESHOLD:-3}
      SUPERVISOR_MODE: ${SUPERVISOR_MODE:-manual}
      RECOMMEND_MODE: ${RECOMMEND_MODE:-manual}
      PII_MODE: ${PII_MODE:-regex}
      TRACE_SYNC_MODE: ${TRACE_SYNC_MODE:-local}
      S3_TRACES_BUCKET: ${S3_TRACES_BUCKET:-}
      AGENTCORE_AGENT_ARN: ${AGENTCORE_AGENT_ARN:-}
      QUEUE_MODE: ${QUEUE_MODE:-redis}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-}
    depends_on:
      - redis
      - dynamodb-local
      - opensearch
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.from_url('redis://redis:6379').ping()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hyperpersona-redis-1
    # Not exposed to the host — server/worker reach it via the docker network
    # at redis://redis:6379. To run redis-cli, use:
    #   docker exec -it hyperpersona-redis-1 redis-cli
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: hyperpersona-dynamodb-1
    ports:
      - "8001:8000"
    command: -jar DynamoDBLocal.jar -sharedDb -inMemory
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: hyperpersona-opensearch-1
    environment:
      cluster.name: hyperpersona-cluster
      node.name: hyperpersona-node
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  traces:
