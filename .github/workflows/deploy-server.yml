name: Deploy server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'
      - '.github/workflows/deploy-server.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ vars.ECR_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/hyperpersona/server:${{ steps.meta.outputs.tag }}
            ${{ vars.ECR_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/hyperpersona/server:main

      - name: Deploy to ECS
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          NEW_IMAGE="${{ vars.ECR_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/hyperpersona/server:${{ steps.meta.outputs.tag }}"

          aws ecs describe-task-definition \
            --task-definition hyperpersona-server \
            --query taskDefinition > /tmp/td.json

          jq --arg img "$NEW_IMAGE" '
            .containerDefinitions[0].image = $img
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
          ' /tmp/td.json > /tmp/td-new.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/td-new.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: $NEW_TD_ARN"

          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service server \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment > /dev/null

          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services server
          echo "Server service stable on $NEW_TD_ARN"
